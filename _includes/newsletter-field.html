{% assign bd_username = include.buttondown_username | default: site.buttondown_username %}

<form action="https://buttondown.com/api/emails/embed-subscribe/{{ bd_username }}" method="post"
  target="popupwindow" onsubmit="window.open('https://buttondown.com/{{ bd_username }}', 'popupwindow')"
  class="newsletter__form" data-controller="newsletter">
  <div class="newsletter__form-group">
    <label for="newsletter-email-input" class="visually-hidden">Email address for newsletter subscription</label>
    <input type="email" name="email" id="newsletter-email-input" placeholder="Enter your email address" required
      aria-describedby="newsletter-email-description" class="newsletter__email-input" data-newsletter-target="email">
    <input type="hidden" value="1" name="embed">
    {% if include.tag %}
    <input type="hidden" name="tag" value="{{ include.tag }}">
    {% endif %}
    {% if include.metadata_source %}
    <input type="hidden" name="metadata__source" value="{{ include.metadata_source }}">
    {% endif %}
    <button type="submit" class="newsletter__submit-button">
      Subscribe
    </button>
  </div>
  <div id="newsletter-email-description" class="visually-hidden">
    Subscribe to receive new blog posts and book release updates via email. You can unsubscribe at any time.
  </div>
</form>
