<header class="header">
  <label class="theme-toggle" data-controller="theme">
    <input type="checkbox" data-action="change->theme#toggle" class="theme-toggle__input"
      aria-label="Toggle between dark and light theme">
    <span class="theme-toggle__slider" aria-hidden="true"></span>
    <span class="visually-hidden">Toggle theme</span>
  </label>

  <div class="header__content">
    <div class="masthead">
      <a href="{{ "/" | relative_url }}" class="masthead__avatar" aria-label="Merovex Press home">
        {% include mark-name.svg %}
      </a>
      <p class="masthead__bio">
        Independent Publisher
      </p>
    </div>
    {% unless include.hide_nav %}
    <nav class="nav" aria-label="Main navigation">
      <a href="{{ "/" | relative_url }}" class="nav__link {% if page.url == "/" %}nav__link--active{% endif %}"{% if
        page.url=="/" %} aria-current="page" {% endif %}>Home</a>
      <a href="{{ "/books/" | relative_url }}" class="nav__link {% if page.url == "/books/" %}nav__link--active{%
        endif %}"{% if page.url=="/books/" %} aria-current="page" {% endif %}>Books</a>
      <a href="{{ "/authors/" | relative_url }}" class="nav__link {% if page.url contains "/authors"
        %}nav__link--active{% endif %}"{% if page.url contains "/authors" %} aria-current="page" {% endif %}>Authors</a>
      <a href="{{ "/blog/" | relative_url }}" class="nav__link {% if page.url == "/blog/" or page.layout=="post"
        %}nav__link--active{% endif %}"{% if page.url=="/blog/" %} aria-current="page" {% endif %}>Blog</a>
      <a href="{{ "/notes/" | relative_url }}" class="nav__link {% if page.url contains "/notes"
        %}nav__link--active{% endif %}"{% if page.url contains "/notes" %} aria-current="page" {% endif %}>Notebook</a>
    </nav>
    {% endunless %}
  </div>
  {% unless include.hide_nav %}
  <hr class="header__divider">
  {% endunless %}
</header>
